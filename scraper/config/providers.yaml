# TariffaRadar v2.1 - configurazione fornitori
#
# urls             : lista di URL candidati da provare in ordine
# render           : auto | always | never
# sitemap_keywords : keyword per auto-discovery su sitemap.xml
# enabled          : false per escludere fonti non compatibili

energia:
  - id: octopus
    nome: Octopus Energy
    urls: [https://octopusenergy.it/le-nostre-tariffe, https://octopusenergy.it/]
    commodity: luce+gas
    render: auto
    sitemap_keywords: [tariffe, offerte]

  - id: enel
    nome: Enel Energia
    urls:
      - https://www.enel.it/it/luce-e-gas/luce/offerte
      - https://www.enel.it/it/luce-e-gas
      - https://www.enel.it/
    commodity: luce+gas
    render: always
    sitemap_keywords: [luce-e-gas, offerte]

  - id: plenitude
    nome: Plenitude (Eni)
    urls:
      - https://eniplenitude.com/offerte/casa
      - https://eniplenitude.com/luce-e-gas
      - https://eniplenitude.com/
    commodity: luce+gas
    render: always
    sitemap_keywords: [offerte, luce]

  - id: a2a
    nome: A2A Energia
    urls:
      - https://www.a2aenergia.eu/offerte-luce-gas
      - https://www.a2aenergia.eu/
      - https://www.a2a.it/
    commodity: luce+gas
    render: always
    sitemap_keywords: [offerte]

  - id: edison
    nome: Edison Energia
    urls:
      - https://www.edisonenergia.it/edison/luce-gas-servizi
      - https://www.edisonenergia.it/
    commodity: luce+gas
    render: always
    sitemap_keywords: [offerte, luce]

  - id: sorgenia
    nome: Sorgenia
    urls:
      - https://www.sorgenia.it/offerte-luce-gas-casa
      - https://www.sorgenia.it/
    commodity: luce+gas
    render: always
    sitemap_keywords: [offerte]

  - id: iren
    nome: Iren Luce Gas e Servizi
    urls:
      - https://www.irenlucegas.it/casa
      - https://www.irenlucegas.it/
    commodity: luce+gas
    render: always
    sitemap_keywords: [offerte, casa]

mobile:
  - id: iliad
    nome: Iliad
    urls:
      - https://www.iliad.it/offerte-iliad-mobile.html
      - https://www.iliad.it/
    link_patterns:
      - 'offerta-iliad-(?P<name>[a-z]+?)(?P<giga>\d{2,3})(?:plus)?-(?P<cents>\d{3,4})\.html'
    render: always
    sitemap_keywords: [offerte]

  - id: ho
    nome: ho. Mobile
    urls: [https://www.ho-mobile.it/]
    render: always
    sitemap_keywords: [offerte]

  - id: very
    nome: Very Mobile
    urls: [https://verymobile.it/]
    render: always
    sitemap_keywords: [offerte]

  - id: kena
    nome: Kena Mobile
    urls: [https://www.kenamobile.it/]
    render: always
    sitemap_keywords: [offerte]

  - id: fastweb
    nome: Fastweb Mobile
    urls:
      - https://www.fastweb.it/fastweb-mobile/
      - https://www.fastweb.it/
    render: always
    sitemap_keywords: [mobile]

  - id: postemobile
    nome: PosteMobile
    urls: [https://www.postemobile.it/]
    render: always
    sitemap_keywords: [offerte, mobile]

  - id: windtre
    nome: WindTre
    urls:
      - https://www.windtre.it/offerte-mobile
      - https://www.windtre.it/
    render: always
    sitemap_keywords: [offerte-mobile, mobile]

  - id: vodafone
    nome: Vodafone
    urls:
      - https://www.vodafone.it/privati/mobile.html
      - https://www.vodafone.it/
    render: always
    sitemap_keywords: [mobile, offerte]

  - id: tim
    nome: TIM
    enabled: false
    urls: [https://www.tim.it/offerte-mobile]
    render: always
    sitemap_keywords: [offerte-mobile]

commodity:
  energy_charts_base: "https://api.energy-charts.info/price"
  # Una sola zona come proxy del PUN: riduce drasticamente le chiamate API
  # e previene i 429 di Energy-Charts nei run orari e nei backfill.
  it_zones: [IT-North]
  min_zones: 1
