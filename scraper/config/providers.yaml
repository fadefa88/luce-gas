# --------------------------------------------------------------------------
# Fonti "materia prima" (indici ufficiali, dati aperti)
# --------------------------------------------------------------------------
commodity:
  # PUN (Prezzo Unico Nazionale, energia elettrica) — GME, prezzi MGP giornalieri
  pun_xml_template: "https://www.mercatoelettrico.org/It/WebServerDataStore/MGP_Prezzi/{date}MGPPrezzi.xml"
  # PSV (gas naturale) — pubblicato dal GME (MGAS). In alternativa puoi
  # incollare un CSV manuale in data/manual_commodity.csv (date,pun,psv).
  psv_xml_template: "https://www.mercatoelettrico.org/It/WebServerDataStore/MGP_Prezzi/{date}MGPPrezzi.xml"
