# ============================================================================
# TariffaRadar — configurazione fornitori
# ----------------------------------------------------------------------------
# Ogni voce indica SOLO la pagina principale pubblica delle offerte.
# Lo scraper non naviga oltre questa pagina (scelta deliberata per privacy
# e rispetto dei siti). I siti cambiano spesso: se un fornitore smette di
# essere rilevato, aggiorna qui "selector" o le regex, senza toccare il codice.
#
#   selector      : selettore CSS del blocco che contiene un'offerta
#   price_regex   : regex per il prezzo (gruppo 1 = numero)
#   name_selector : selettore (relativo al blocco) del nome offerta
# ============================================================================

energia:
  # Fonte primaria consigliata: Portale Offerte ARERA (dato ufficiale, open data).
  # Vedi fetch_energy_offers.py. Le voci sotto sono il fallback "pagina offerte"
  # dei singoli fornitori.
  - id: enel
    nome: Enel Energia
    url: https://www.enel.it/it-it/luce-e-gas/luce
    commodity: luce
    selector: "[class*=card]"
    price_regex: '(\d+[.,]\d+)\s*€\s*/?\s*kWh'
    name_selector: "h2, h3"
  - id: enel-gas
    nome: Enel Energia
    url: https://www.enel.it/it-it/luce-e-gas/gas
    commodity: gas
    selector: "[class*=card]"
    price_regex: '(\d+[.,]\d+)\s*€\s*/?\s*Smc'
    name_selector: "h2, h3"
  - id: plenitude
    nome: Plenitude (Eni)
    url: https://eniplenitude.com/offerte-luce-gas
    commodity: luce+gas
    selector: "[class*=card], [class*=offer]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"
  - id: a2a
    nome: A2A Energia
    url: https://www.a2aenergia.eu/offerte
    commodity: luce+gas
    selector: "[class*=card], [class*=offer]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"
  - id: edison
    nome: Edison Energia
    url: https://www.edisonenergia.it/offerte
    commodity: luce+gas
    selector: "[class*=card], [class*=offer]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"
  - id: sorgenia
    nome: Sorgenia
    url: https://www.sorgenia.it/offerte-luce-gas
    commodity: luce+gas
    selector: "[class*=card], [class*=offer]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"
  - id: iren
    nome: Iren Luce Gas e Servizi
    url: https://www.irenlucegas.it/offerte
    commodity: luce+gas
    selector: "[class*=card], [class*=offer]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"
  - id: octopus
    nome: Octopus Energy
    url: https://octopusenergy.it/le-nostre-tariffe
    commodity: luce+gas
    selector: "[class*=card], [class*=tariff]"
    price_regex: '(\d+[.,]\d+)\s*€'
    name_selector: "h2, h3"

