name: Update offers data

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run importer without committing'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare sources file
        run: |
          if [ ! -f data/sources.json ]; then
            cp data/sources.example.json data/sources.json
          fi

      - name: Import sources
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/import_sources.py --sources data/sources.json --output data/offers.json

      - name: Dry run import
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: python scripts/import_sources.py --sources data/sources.json --dry-run

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Commit changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- data/offers.json data/price-history.json data/energy-index.json; then
            echo "No offer changes to commit."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/offers.json data/price-history.json data/energy-index.json
          git commit -m "Update tariff offer data"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
