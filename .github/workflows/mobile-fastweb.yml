name: mobile · fastweb

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["providers/mobile/fastweb.py", "lib/**"]

permissions:
  contents: write

jobs:
  run:
    uses: ./.github/workflows/_scrape-provider.yml
    with: {module: "providers.mobile.fastweb", fragment: "mobile__fastweb"}
