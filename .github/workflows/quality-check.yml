name: Quality check

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate JSON files
        run: |
          python -m json.tool data/offers.json > /tmp/offers.json
          python -m json.tool data/price-history.json > /tmp/history.json
          python -m json.tool data/energy-index.json > /tmp/energy.json
          python scripts/validate_data.py
