name: Audit tariff sources without commit

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which sources to audit"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - energy-only
          - fiber-only
      limit_energy:
        description: "Optional ARERA energy offer limit for fast audit; 0 = no limit"
        required: true
        default: "100"
        type: string
      delay_seconds:
        description: "Delay between requests to the same host"
        required: true
        default: "3.5"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Ensure source registry exists
        run: |
          if [ ! -f data/sources.json ]; then
            cp data/sources.example.json data/sources.json
          fi

      - name: Run audit dry-run
        env:
          TARIFF_RADAR_UA: ${{ secrets.TARIFF_RADAR_UA }}
        run: |
          mkdir -p artifacts
          MODE="${{ github.event.inputs.mode }}"
          LIMIT="${{ github.event.inputs.limit_energy }}"
          DELAY="${{ github.event.inputs.delay_seconds }}"
          ARGS="--sources data/sources.json --output data/offers.json --commodity-output data/commodity-index.json --correlation-output data/market-correlation.json --snapshot-output data/offer-snapshots.json --arera-browser-fallback --dry-run"
          if [ "$MODE" = "energy-only" ]; then ARGS="$ARGS --skip-fiber"; fi
          if [ "$MODE" = "fiber-only" ]; then ARGS="$ARGS --skip-energy"; fi
          if [ "$LIMIT" != "0" ] && [ -n "$LIMIT" ]; then ARGS="$ARGS --limit-energy $LIMIT"; fi
          if [ -n "$DELAY" ]; then ARGS="$ARGS --delay $DELAY"; fi
          python scripts/import_sources.py $ARGS 2>&1 | tee artifacts/audit-sources.log

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tariff-source-audit-log
          path: artifacts/audit-sources.log
          if-no-files-found: ignore
          retention-days: 30
