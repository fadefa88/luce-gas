name: Validate data and code

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - "js/**"
      - "css/**"
      - "index.html"
      - "requirements.txt"
      - ".github/workflows/**"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python scripts
        run: python -m py_compile scripts/import_sources.py scripts/validate_data.py

      - name: Validate tariff JSON data
        run: python scripts/validate_data.py

      - name: Check frontend JavaScript syntax
        run: node --check js/app.js
