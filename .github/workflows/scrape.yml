name: Aggiorna offerte e indici

on:
  schedule:
    # ogni ora, al minuto 7 (evita la congestione del minuto 0 su GitHub)
    - cron: "7 * * * *"
  workflow_dispatch: {}   # consente l'avvio manuale dalla tab Actions
  push:
    branches: [main]
    paths: ["scraper/**"]

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installa dipendenze
        run: pip install -r scraper/requirements.txt

      - name: Esegui scraper
        env:
          # opzionale: URL del dataset open data del Portale Offerte ARERA
          PORTALE_OPEN_DATA_URL: ${{ vars.PORTALE_OPEN_DATA_URL }}
        run: python -m scraper.main

      - name: Commit dei dati aggiornati
        run: |
          git config user.name  "tariffaradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nessuna variazione nei dati."
          else
            git commit -m "dati: aggiornamento automatico $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
