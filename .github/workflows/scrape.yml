name: Aggiorna offerte e indici

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - ".github/workflows/scrape.yml"
      - "data/manual_commodity.csv"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: scrape-production
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Esegui scraper
        env:
          PORTALE_OPEN_DATA_URL: ${{ vars.PORTALE_OPEN_DATA_URL }}
        run: python -m scraper.main

      - name: Verifica output minimo
        run: |
          test -f data/scrape_status.json
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('data/scrape_status.json').read_text(encoding='utf-8'))
          print(json.dumps(status, indent=2, ensure_ascii=False))
          PY

      - name: Commit dati aggiornati
        run: |
          git config user.name "tariffaradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/

          if git diff --cached --quiet; then
            echo "Nessuna variazione nei dati."
            exit 0
          fi

          git commit -m "dati: aggiornamento automatico $(date -u +'%Y-%m-%d %H:%M UTC')"

          for attempt in 1 2 3; do
            echo "Tentativo push $attempt/3"
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Push non riuscito dopo 3 tentativi" >&2
          exit 1
