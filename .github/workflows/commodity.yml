name: materia prima · PUN/PSV

on:
  schedule: [{cron: "50 * * * *"}]
  workflow_dispatch:
    inputs:
      backfill_from: {description: "Backfill da YYYY-MM-DD", required: false, default: ""}

permissions:
  contents: write
concurrency: {group: data-commit, cancel-in-progress: false}

jobs:
  commodity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip, cache-dependency-path: scraper/requirements.txt}
      - run: pip install -r scraper/requirements.txt
      - name: Backfill (se richiesto)
        if: ${{ github.event.inputs.backfill_from != '' }}
        run: python -m scraper.backfill "${{ github.event.inputs.backfill_from }}"
      - name: Aggiorna PUN/PSV
        run: python -m scraper.fetch_commodity
      - name: Commit
        run: |
          git config user.name  "tariffaradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/history/commodity_history.json data/commodity_latest.json
          if git diff --cached --quiet; then echo "nessuna variazione"; else
            git commit -m "dati(commodity): $(date -u +'%F %H:%M UTC')"
            for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep $((RANDOM%10+5)); done
          fi
