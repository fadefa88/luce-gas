name: aggregate · ricomponi dati sito

on:
  schedule: [{cron: "55 * * * *"}]   # a fine ora, dopo gli scraper
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["data/providers/**", "lib/aggregate.py"]

permissions:
  contents: write
concurrency: {group: data-commit, cancel-in-progress: false}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: python -m lib.aggregate
      - name: Commit dati aggregati
        run: |
          git config user.name  "tariffaradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/offers_mobile.json data/offers_energy.json data/scrape_report.json data/history/
          if git diff --cached --quiet; then echo "nessuna variazione"; else
            git commit -m "dati: aggregazione $(date -u +'%F %H:%M UTC')"
            for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break || sleep $((RANDOM%10+5)); done
          fi
