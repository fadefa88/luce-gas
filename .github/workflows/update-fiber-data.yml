name: Update fiber data only

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Audit only: run fiber scraper without committing"
        required: true
        default: false
        type: boolean
      delay_seconds:
        description: "Delay between requests to the same host"
        required: true
        default: "3.5"
        type: string
  schedule:
    - cron: "37 5 * * 1,3,5"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: tariff-data-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-fiber:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure source registry exists
        run: |
          if [ ! -f data/sources.json ]; then
            cp data/sources.example.json data/sources.json
          fi

      - name: Scrape official fiber sources
        env:
          TARIFF_RADAR_UA: ${{ secrets.TARIFF_RADAR_UA }}
        run: |
          mkdir -p artifacts
          ARGS="--sources data/sources.json --output data/offers.json --commodity-output data/commodity-index.json --correlation-output data/market-correlation.json --snapshot-output data/offer-snapshots.json --skip-energy"
          DELAY="${{ github.event.inputs.delay_seconds || '3.5' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ -n "$DELAY" ]; then ARGS="$ARGS --delay $DELAY"; fi
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/import_sources.py $ARGS 2>&1 | tee artifacts/update-fiber.log

      - name: Validate data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/validate_data.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-fiber-log
          path: artifacts/update-fiber.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated fiber data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/offers.json data/market-correlation.json data/offer-snapshots.json data/sources.json
          if git diff --cached --quiet; then
            echo "No fiber data changes to commit."
            exit 0
          fi
          git commit -m "Update fiber tariff data"
          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            git pull --rebase origin "$BRANCH" && git push origin HEAD:"$BRANCH" && exit 0
            git rebase --abort || true
            sleep $((i * 5))
          done
          exit 1
