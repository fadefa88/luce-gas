name: _scrape-provider (reusable)

on:
  workflow_call:
    inputs:
      module:   {required: true, type: string}   # es. providers.mobile.iliad
      fragment: {required: true, type: string}   # es. mobile__iliad

permissions:
  contents: write
concurrency:
  group: data-commit          # un commit alla volta tra tutti i provider
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip, cache-dependency-path: scraper/requirements.txt}
      - run: |
          pip install -r scraper/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape ${{ inputs.module }}
        run: python -m ${{ inputs.module }}

      - name: Mostra frammento prodotto
        run: |
          echo "----- data/providers/${{ inputs.fragment }}.json -----"
          cat data/providers/${{ inputs.fragment }}.json || echo "FRAMMENTO NON TROVATO"

      - name: Debug HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with: {name: "debug-${{ inputs.fragment }}", path: debug/, if-no-files-found: ignore, retention-days: 3}

      - name: Commit del solo frammento
        run: |
          git config user.name  "tariffaradar-bot"
          git config user.email "actions@users.noreply.github.com"
          # Si committa ESCLUSIVAMENTE il proprio frammento: file che nessun
          # altro workflow tocca -> nessun conflitto di merge possibile.
          git add data/providers/${{ inputs.fragment }}.json
          if git diff --cached --quiet; then
            echo "Nessuna variazione nel frammento."
            exit 0
          fi
          git commit -m "dati(${{ inputs.fragment }}): aggiornamento $(date -u +'%F %H:%M UTC')"
          pushed=0
          for i in 1 2 3 4 5; do
            # rebase solo su un nostro file: in pratica non confligge mai,
            # ma se il working tree fosse sporco lo ripuliamo prima di ritentare.
            if git pull --rebase --autostash origin main && git push; then pushed=1; break; fi
            echo "push tentativo $i fallito, ritento..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 10 + 5))
          done
          if [ "$pushed" != "1" ]; then
            echo "::error::push del frammento fallito dopo 5 tentativi"; exit 1
          fi
          echo "frammento committato e pushato."
